name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (arm64 + armv7)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

      # ── 1. Récupérer le code ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache buildozer ────────────────────────────────────────────
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 4. Dépendances système ─────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-pip python3-venv git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libltdl-dev \
            build-essential

      # ── 5. Buildozer + Cython ─────────────────────────────────────────
      - name: Install buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ── 6. Accepter les licences Android SDK ──────────────────────────
      # Sans ça, sdkmanager refuse d'installer build-tools (rc2),
      # aidl est introuvable et le build échoue.
      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses

          # Hash officiel licence android-sdk standard
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

          # Hash officiel licence preview
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

          # Forcer build-tools stable 34.0.0 (pas la rc2 défectueuse)
          sed -i 's/^android\.api\s*=.*/android.api = 33/' buildozer.spec

      # ── 7. Build debug APK ────────────────────────────────────────────
      - name: Build APK (debug)
        env:
          # yes | redirige "y" vers toute demande interactive de sdkmanager
          JAVA_OPTS: "-Dsdkmanager.auto_accept_licenses=true"
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log

      # ── 8. Vérifier que l'APK existe ──────────────────────────────────
      - name: Check APK output
        run: |
          ls -lh bin/*.apk
          echo "APK_PATH=$(ls bin/*.apk | head -1)" >> $GITHUB_ENV

      # ── 9. Upload APK ─────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fakescan-debug-apk
          path: bin/*.apk
          retention-days: 30

      # ── 10. Upload log (même en cas d'échec) ─────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

  # ── Release automatique sur tag vX.Y.Z ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: fakescan-debug-apk
          path: bin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          name: "Fake Scan PDF ${{ github.ref_name }}"
          body: |
            ## Fake Scan PDF ${{ github.ref_name }}

            ### Installation
            1. Télécharger le fichier `.apk` ci-dessous
            2. Sur Android : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvrir le fichier `.apk` pour installer
          draft: false
          prerelease: false
