name: Build Android APK

"on":
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-
      
      - name: Build APK via kivy/buildozer Docker image
        run: |
          docker run --rm \
            --entrypoint /bin/sh \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e HOME=/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            -c "git config --global --add safe.directory '*' && yes | /home/user/.venv/bin/python -m buildozer android debug"
            
      - name: Find APK
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Found: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fakescan-debug-apk
          path: bin/*.apk
          retention-days: 30

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: fakescan-debug-apk
          path: bin/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          name: Fake Scan PDF ${{ github.ref_name }}
          body: |
            ## Fake Scan PDF ${{ github.ref_name }}
          draft: false
          prerelease: false
